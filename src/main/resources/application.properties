spring.application.name=HealthMate AI

# ---------------------------------------------------------------------------
# Database configuration (MySQL by default; overridden via env vars)
# Works with Railway's MySQL plugin which injects MYSQLHOST / MYSQLPORT / etc,
# as well as generic MYSQL_HOST / MYSQL_PORT / MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD
# ---------------------------------------------------------------------------
DB_HOST=${MYSQLHOST:${MYSQL_HOST:localhost}}
DB_PORT=${MYSQLPORT:${MYSQL_PORT:3306}}
DB_NAME=${MYSQLDATABASE:${MYSQL_DATABASE:healthmate_ai}}
DB_USER=${MYSQLUSER:${MYSQL_USER:root}}
DB_PASSWORD=${MYSQLPASSWORD:${MYSQL_PASSWORD:password}}

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

server.port=${PORT:8080}

# Automatically opens your default browser to the app once it finishes starting up (local dev only —
# has no effect on headless servers like Railway). Set to false to disable.
app.browser.auto-open=true

# ---------------------------------------------------------------------------
# Groq LLM configuration
# ---------------------------------------------------------------------------
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.thymeleaf.cache=false
logging.level.com.healthmate.ai=INFO
