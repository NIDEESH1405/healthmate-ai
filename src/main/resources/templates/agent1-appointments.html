<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment Scheduling — HealthMate AI</title>
  <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div class="page-shell">
  <div th:replace="~{fragments/layout :: navbar('appointments')}"></div>
  <div th:replace="~{fragments/layout :: disclaimer-strip}"></div>

  <main class="main-content">
    <div class="container">
      <div class="agent-header">
        <div class="agent-icon accent-appointment" style="background:var(--agent-appointment); color:white;" th:insert="~{fragments/icons :: calendar}"></div>
        <div>
          <h1>Appointment Scheduling</h1>
          <p>Book a slot with the right department and doctor. This confirms logistics only — it does not provide medical advice.</p>
        </div>
      </div>

      <div th:if="${bookingResult != null}" class="alert alert-success">
        <strong>Appointment confirmed!</strong>
        <p style="margin:8px 0 0; color:inherit;" th:text="${bookingResult.confirmationMessage}"></p>
        <p th:if="${bookingResult.warning != null}" style="margin:8px 0 0; color:#92620A;" th:text="${bookingResult.warning}"></p>
      </div>

      <div style="display:grid; grid-template-columns: 1.1fr 1fr; gap:24px;">
        <div class="card">
          <div class="card-header"><h2>Book an appointment</h2></div>
          <form th:action="@{/agents/appointments/book}" th:object="${appointmentRequest}" method="post" id="bookingForm">
            <div class="form-row">
              <div class="form-group">
                <label for="department">Department</label>
                <select id="department" th:field="*{department}">
                  <option value="">Select department</option>
                  <option th:each="dept : ${departments}" th:value="${dept.name}" th:text="${dept.name}"></option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
              </div>
              <div class="form-group">
                <label for="doctorName">Doctor</label>
                <select id="doctorName" th:field="*{doctorName}">
                  <option value="">Select department first</option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('doctorName')}" th:errors="*{doctorName}"></div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="appointmentDate">Date</label>
                <input type="date" id="appointmentDate" th:field="*{appointmentDate}">
                <div class="field-error" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
              </div>
              <div class="form-group">
                <label for="appointmentTime">Time</label>
                <input type="time" id="appointmentTime" th:field="*{appointmentTime}">
                <div class="field-error" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="patientName">Patient name</label>
                <input type="text" id="patientName" th:field="*{patientName}" placeholder="Full name">
                <div class="field-error" th:if="${#fields.hasErrors('patientName')}" th:errors="*{patientName}"></div>
              </div>
              <div class="form-group">
                <label for="contactNumber">Contact number</label>
                <input type="tel" id="contactNumber" th:field="*{contactNumber}" placeholder="+65 xxxx xxxx">
                <div class="field-error" th:if="${#fields.hasErrors('contactNumber')}" th:errors="*{contactNumber}"></div>
              </div>
            </div>

            <button type="submit" class="btn btn-block" style="background:var(--agent-appointment); color:white;">Book appointment</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header"><h2>Your appointments</h2></div>
          <div th:if="${#lists.isEmpty(appointments)}" class="empty-state">No appointments booked yet.</div>
          <div th:each="appt : ${appointments}" class="list-row">
            <div class="list-row-main">
              <span class="list-row-title" th:text="${appt.patientName} + ' · ' + ${appt.department}"></span>
              <span class="list-row-sub" th:text="${appt.doctorName} + ' — ' + ${appt.appointmentDate} + ' ' + ${appt.appointmentTime}"></span>
            </div>
            <div class="list-row-actions">
              <span class="badge" th:classappend="${appt.status == 'CONFIRMED'} ? 'badge-confirmed' : 'badge-cancelled'" th:text="${appt.status}"></span>
              <form th:if="${appt.status == 'CONFIRMED'}" th:action="@{'/agents/appointments/' + ${appt.id} + '/cancel'}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Cancel</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/layout :: footer}"></div>
</div>

<div id="departmentsData" th:attr="data-departments=${departmentsJson}" style="display:none;"></div>
<script th:src="@{/js/agent1.js}"></script>
</body>
</html>
