# ---------------------------------------------------------------------------
# H2 in-memory profile — FOR LOCAL VERIFICATION / QUICK DEMO ONLY.
# Activate with: --spring.profiles.active=h2
# Production deployments should use the default MySQL configuration.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:healthmate;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
