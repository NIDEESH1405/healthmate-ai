<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Info — HealthMate AI</title>
  <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<div class="page-shell">
  <div th:replace="~{fragments/layout :: navbar('hospital')}"></div>
  <div th:replace="~{fragments/layout :: disclaimer-strip}"></div>

  <main class="main-content">
    <div class="container">
      <div class="agent-header">
        <div class="agent-icon" style="background:var(--agent-hospital); color:white;" th:insert="~{fragments/icons :: hospital}"></div>
        <div>
          <h1 th:text="${hospitalName}">Hospital Info</h1>
          <p>Ask a question grounded in our knowledge base, or browse the full directory.</p>
        </div>
      </div>

      <div class="tabs">
        <span class="tab-link active" data-tab="qa">Ask a question</span>
        <span class="tab-link" data-tab="browse">Browse directory</span>
      </div>

      <div id="tab-qa" class="tab-panel active">
        <div class="card">
          <div class="card-header">
            <h3 style="margin:0;">Conversation</h3>
            <form th:action="@{/agents/hospital-info/reset}" method="post">
              <button type="submit" class="btn btn-secondary btn-sm">New conversation</button>
            </form>
          </div>

          <div class="chat-window" th:if="${!#lists.isEmpty(conversation)}">
            <div th:each="msg : ${conversation}"
                 th:class="'chat-bubble ' + (${msg.role == 'user'} ? 'user' : 'assistant')"
                 th:text="${msg.content}"></div>
          </div>
          <div th:if="${#lists.isEmpty(conversation)}" class="empty-state">
            Ask anything about departments, hours, billing, labs, parking, and more — follow-up questions are understood in context.
          </div>

          <div th:if="${qaResult != null and !#lists.isEmpty(qaResult.sources)}" style="margin-bottom:12px;">
            <span class="section-title" style="display:block; margin-bottom:4px;">Sources for latest answer</span>
            <span th:each="s : ${qaResult.sources}" class="source-chip" th:text="${s.title}"></span>
          </div>

          <form th:action="@{/agents/hospital-info/ask}" method="post" class="flex" style="gap:10px;">
            <input type="text" name="question" placeholder="E.g. what are your OPD hours?" required style="flex:1;">
            <button type="submit" class="btn" style="background:var(--agent-hospital); color:white;">Ask</button>
          </form>
        </div>
      </div>

      <div id="tab-browse" class="tab-panel">
        <div class="kb-grid">
          <div th:each="topic : ${topics}" class="kb-card">
            <div class="kb-card-header">
              <div class="kb-icon-badge" th:insert="~{fragments/icons :: ${topic.icon}}"></div>
              <h4 th:text="${topic.title}"></h4>
            </div>
            <p th:text="${topic.content}"></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/layout :: footer}"></div>
</div>
<script th:src="@{/js/agent5.js}"></script>
</body>
</html>
